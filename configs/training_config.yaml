# Training Configuration for Higgs-Audio V2 LoRA Fine-tuning
# Arabic+English Zero-Shot Voice Cloning

# Model and data paths
model_path: "bosonai/higgs-audio-v2-generation-3B-base"
audio_tokenizer_path: "bosonai/higgs-audio-v2-tokenizer"
dataset_path: "/workspace/data/processed_chatml"
output_dir: "/workspace/outputs/higgs-lora-arabic-english"

# Training hyperparameters
num_epochs: 3
batch_size_per_device: 2
gradient_accumulation_steps: 8
learning_rate: 2.0e-4
weight_decay: 0.01
warmup_ratio: 0.1
max_grad_norm: 1.0

# LoRA configuration
lora_r: 16
lora_alpha: 32
lora_dropout: 0.1

# Audio-specific settings
max_audio_length: 1500  # Max audio tokens
max_text_length: 512    # Max text tokens

# Distributed training
deepspeed_config: "/workspace/higgs-audio/configs/deepspeed_config.json"
use_deepspeed: true
use_accelerate: true

# Logging and checkpointing
logging_steps: 10
save_steps: 500
eval_steps: 500
save_total_limit: 3

# Wandb logging
use_wandb: true
wandb_project: "higgs-audio-lora-arabic-english"
wandb_run_name: "lora-r16-arabic-english-500h"

# Data processing
train_split_ratio: 0.9
val_split_ratio: 0.1
num_workers: 8

# Mixed precision
fp16: false
bf16: true

# Optimization
optimizer_type: "adamw"
scheduler_type: "linear"

# Language-specific settings
arabic_weight: 1.0
english_weight: 1.0
mixed_weight: 1.5  # Higher weight for code-switching samples
